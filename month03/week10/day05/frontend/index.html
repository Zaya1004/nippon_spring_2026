<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flexbox & Grid Masterclass</title>
  <style>
    /* Paste the CSS code here if you aren't using a separate style.css file */
  </style>
  <link rel="stylesheet" href="./css/styles.css">
</head>
<body>

  <div class="dashboard-grid">
    
    <header class="header">
      <h2>My Application Dashboard</h2>
    </header>
    
    <aside class="sidebar">
      <ul>
        <li><a href="#">Dashboard</a></li>
        <li><a href="#">Photos</a></li>
        <li><a href="#">Settings</a></li>
        <li><a href="#">Logout</a></li>
      </ul>
    </aside>
    
    <main class="main">
      
      <div class="search-section">
        <h3>Search Photos</h3>
        <form class="search-form-flex" onsubmit="event.preventDefault();">
          <input type="text" class="search-input" placeholder="Search for nature, cars, cities...">
          <button type="submit" class="search-button">Search</button>
        </form>
      </div>

      <div class="gallery-section">
        <h3>Recent Uploads</h3>
        <div class="gallery-grid">
          <div class="photo featured-photo">1 (Featured)</div>
          <div class="photo">2</div>
          <div class="photo">3</div>
          <div class="photo">4</div>
          <div class="photo">5</div>
          <div class="photo">6</div>
          <div class="photo">7</div>
        </div>
      </div>

    </main>
    
    <footer class="footer">
      <p>&copy; 2026 Your Company Name. All rights reserved.</p>
    </footer>

  </div>

</body>
</html>
