<style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; min-height: 100vh; }

    .page {
      display: grid;
      grid-template-columns: 220px 1fr;
      grid-template-rows: 60px 1fr 50px;
      min-height: 100vh;
      gap: 0;
    }

    header {
      grid-column: 1 / -1;  /* span all columns */
      background: #1e3a5f;
      color: white;
      display: flex;
      align-items: center;
      padding: 0 24px;
      font-size: 18px;
      font-weight: bold;
    }

    .sidebar {
      background: #f5f5f5;
      padding: 20px;
      border-right: 1px solid #ddd;
    }
    .sidebar h3 { font-size: 13px; color: #888; text-transform: uppercase; margin-bottom: 12px; }
    .sidebar a  { display: block; padding: 8px 0; color: #333; text-decoration: none; font-size: 14px; }
    .sidebar a:hover { color: #1976d2; }

    main {
      padding: 30px;
    }
    main h2 { margin-bottom: 16px; color: #1e3a5f; }
    main p  { color: #555; line-height: 1.7; }

    footer {
      grid-column: 1 / -1;
      background: #1e3a5f;
      color: #90caf9;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
    }</style>
</head>
<body>
  <div class="page">
    <header>iCode Academy</header>
    <aside class="sidebar">
      <h3>Navigation</h3>
      <a href="#">Dashboard</a>
      <a href="#">Lessons</a>
      <a href="#">Exercises</a>
      <a href="#">Progress</a>
      <a href="#">Settings</a>
    </aside>
    <main>
      <h2>Week 10 — Grid Layout</h2>
      <p>CSS Grid gives us 2-dimensional control over layout. This page uses a 2-column grid with a spanning header and footer.</p>
    </main>
    <footer>&copy; 2024 iCode Academy</footer>
  </div>
