<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./gridBasic.css">
</head>

<body>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: sans-serif;
            padding: 30px;
            background: #f4f4f4;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }

        .card {
            background: white;
            border-radius: 10px;
            padding: 24px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.08);
            text-align: center;
        }

        .card-icon {
            font-size: 36px;
            margin-bottom: 12px;
        }

        .card h3 {
            margin-bottom: 8px;
            color: #1a1a2e;
        }

        .card p {
            color: #666;
            font-size: 14px;
            line-height: 1.6;
        }
    </style>
    </head>

    <body>
        <div class="grid">
            <div class="card">
                <div class="card-icon">☕</div>
                <h3>Java</h3>
                <p>OOP, Spring Boot, REST API</p>
            </div>
            <div class="card">
                <div class="card-icon">🎨</div>
                <h3>CSS</h3>
                <p>Flexbox, Grid, Animations</p>
            </div>
            <div class="card">
                <div class="card-icon">📊</div>
                <h3>ITPEC</h3>
                <p>Algorithm, Data Structure</p>
            </div>
            <div class="card">
                <div class="card-icon">🗄️</div>
                <h3>SQL</h3>
                <p>PostgreSQL, JPA, Queries</p>
            </div>
            <div class="card">
                <div class="card-icon">⚛️</div>
                <h3>React</h3>
                <p>Components, State, Hooks</p>
            </div>
            <div class="card">
                <div class="card-icon">👥</div>
                <h3>Teamwork</h3>
                <p>GitHub, Code Review, Kanban</p>
            </div>
        </div>
    </body>

</html>
