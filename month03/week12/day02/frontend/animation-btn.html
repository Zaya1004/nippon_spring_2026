<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="animation.css">
</head>
<style>
    * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: sans-serif;
    text-align: center;
    padding: 50px;
}

.container {
    display: flex;
    gap: 50px;
}
.btn {
   
    gap: 24px;
    width: 100px;
    height: 100px;
    background-color: #e039a9;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    font-weight: bold;
    cursor: pointer;
    border-radius: 8px;
    transition: all 0.4s ease;
}

.btn-scale:hover {
    transform: scale(1.2);
    box-shadow: 0px 20px 20px rgba(0, 0, 0, 0.4);
}

.btn-color:hover {
    background-color: aqua;
}

.btn-border:hover {
    border-color: rgb(192, 176, 178);
    border-style: dashed;
}

.btn-underline:hover {
    background: transparent;
    position: relative;
    border-radius: 0;
    padding-bottom: 6px;
}

.btn-underline::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    width: 0;
    height: 20px;
    background: #9b59b6;
    transition: width 0.3s ease;
}

.btn-underline:hover::after {
    width: 100%;
}
</style>

<body>
  <div class="container">
    <button class="btn btn-scale">Томрох + Сүүдэр</button>
    <button class="btn btn-color">Өнгө Солих</button>
    <button class="btn btn-border">Хүрээ Гарч Ирэх</button>
    <button class="btn btn-underline">Доогуур Зураас</button>
  </div>
</body>

</html>
