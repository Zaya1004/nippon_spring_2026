<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Transitions for Beginners</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <h1>CSS Transition Playground</h1>
  <p>Hover over the boxes to see the transitions in action!</p>

  <div class="container">
    <div class="box ex-1">Color Fade</div>

    <div class="box ex-2">Grow</div>

    <div class="box ex-3">Slide Right</div>

    <div class="box ex-4">Elevate</div>

    <div class="box ex-5">Spin & Circle</div>

    <input type="text" id="input">
  </div>

</body>
</html>
